<!DOCTYPE html>
<html>
<head>
    <title>Buttons</title>

    <style>
        .subscribe_button{ 
            background-color: rgb(106, 0, 0);  
            color: white;
            border: none;
            border-radius: 7px;
            height: 30px;
            width: 100px;
            cursor: pointer;
            transition: box-shadow 0.3s;
        }

        .subscribe_button:hover{
            box-shadow: 0 2px 4px black;
            opacity: 0.8;
        }

        .subscribe_button:active{
            opacity: 0.6;
        }

        .join_button{ 
            background-color: white;  
            color: black;
            border: 2px solid green;
            height: 34px;
            width: 60px;
            border-radius: 2px;
            margin-left: 9px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .join_button:hover{
            box-shadow: 0 2px 4px black;
            background-color: rgb(0, 123, 255);
            color: white;
        }

        .join_button:active{
            opacity: 0.6;
        }

        .tweet_button{ 
            background-color: rgb(31, 83, 83);  
            color: white;
            height: 34px;
            width: 70px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-left: 9px;
            transition: box-shadow 0.3s;
        }

        .tweet_button:hover{
            box-shadow: 0 2px 4px black;
            background-color: rgb(143, 243, 248);
        }

        .tweet_button:active{
            background-color: rgb(4, 4, 49);
        }
    </style>
</head>

<body>

    <button class="subscribe_button">Subscribe</button>
    <button class="join_button">Join!</button>
    <button class="tweet_button">Tweet!</button>

</body>
</html>
